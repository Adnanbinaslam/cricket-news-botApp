id: cricket-fetch
namespace: cricket

triggers:
  - id: fetch-schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */4 * * *"
    timezone: Asia/Kolkata

tasks:
  - id: fetch-news
    type: io.kestra.plugin.core.http.Request
    uri: http://localhost:8081/test/fetch-now
    method: GET

name: Deploy Cricket Bot + Kestra

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Spring Boot JAR
      run: mvn clean package -DskipTests

    - name: Deploy to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      run: |
        mkdir -p ~/.ssh
        echo "$EC2_SSH_KEY" > ~/.ssh/ec2-key.pem
        chmod 600 ~/.ssh/ec2-key.pem
        ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null

        ssh -i ~/.ssh/ec2-key.pem $EC2_USER@$EC2_HOST \
          "mkdir -p ~/apps/cricket-bot ~/apps/kestra/flows"

        scp -i ~/.ssh/ec2-key.pem \
          target/*.jar \
          $EC2_USER@$EC2_HOST:~/apps/cricket-bot/

        scp -i ~/.ssh/ec2-key.pem \
          kestra-flows/*.yaml \
          $EC2_USER@$EC2_HOST:~/apps/kestra/flows/

        ssh -i ~/.ssh/ec2-key.pem $EC2_USER@$EC2_HOST \
          MASTODON_TOKEN="$MASTODON_TOKEN" \
          DB_PASSWORD="$DB_PASSWORD" \
          'bash -s' << 'EOF'

          # 1. Kill by port (reliable!)
          fuser -k 8080/tcp || true
          fuser -k 8081/tcp || true
          sleep 3

          # 2. Start Spring Boot FIRST
          cd ~/apps/cricket-bot
          nohup java -jar *.jar \
            --spring.profiles.active=prod \
            --mastodon.access.token="$MASTODON_TOKEN" \
            --spring.datasource.password="$DB_PASSWORD" \
            > app.log 2>&1 &
          echo "Waiting for Spring Boot..."
          sleep 20

          # 3. Start Kestra
          cd ~/apps/kestra
          nohup java -jar kestra.jar server local > kestra.log 2>&1 &
          echo "Waiting for Kestra..."
          sleep 20

          # 4. Import flows
          for flow in ~/apps/kestra/flows/*.yaml; do
            echo "Importing: $flow"
            curl -X POST http://localhost:8080/api/v1/flows/import \
              -H "Content-Type: multipart/form-data" \
              -F "fileUpload=@$flow"
          done

          echo "✅ Everything started!"
        EOF
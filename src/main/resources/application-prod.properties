spring.application.name=cricket-news-bot
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cricket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=${DB_PASSWORD}

# JPA Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# RSS Configuration
cricket.rss.url=https://www.espncricinfo.com/rss/content/story/feeds/0.xml

# Mastodon Configuration
mastodon.instance.url=https://mastodon.social
mastodon.access.token=${MASTODON_TOKEN}

# Fixed Logging Level (Changed from OFF to INFO so we can watch connection handshakes live)
logging.level.root=INFO
logging.level.com.cricketbot=INFO


  mysql:
    image: mysql:8.0
    container_name: cricketbot-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password100524862046
      MYSQL_DATABASE: cricket_db
      MYSQL_USER: cricketuser
      MYSQL_PASSWORD: password100524862046
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword100524862046"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cricketbot-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: